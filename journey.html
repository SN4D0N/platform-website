<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Journey — Platform</title>
  <meta name="description" content="Track this live train journey shared via Platform.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1a1f;
      --card:        #23232c;
      --card-inner:  #2a2a35;
      --border:      rgba(255,255,255,0.07);
      --border-lit:  rgba(255,255,255,0.12);
      --text:        #ffffff;
      --text-soft:   #8e8e9a;
      --text-faint:  #4a4a58;
      --blue:        #4a8fff;
      --green:       #34c759;
      --amber:       #ff9f0a;
      --red:         #ff3b30;
      --sans:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --r:           14px;
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* NAV — matches index.html exactly */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
      background: rgba(26,26,31,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text);
      font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em;
    }
    .logo-pill { display: flex; align-items: center; gap: 3px; }
    .lp-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); }
    .lp-dash { width: 13px; height: 3px; border-radius: 2px; background: var(--blue); opacity: 0.45; }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(52,199,89,0.1); border: 1px solid rgba(52,199,89,0.22);
      border-radius: 20px; padding: 5px 12px;
      font-size: 0.72rem; font-weight: 600; color: var(--green);
    }
    .live-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 5px var(--green);
      animation: blink 2s ease-in-out infinite; flex-shrink: 0;
    }

    /* MAIN */
    .main {
      max-width: 520px; margin: 0 auto;
      padding: 96px 20px 80px;
    }

    /* Loading */
    .loading { text-align: center; padding: 80px 0; }
    .spinner {
      width: 28px; height: 28px; margin: 0 auto 16px;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .loading p { font-size: 0.875rem; color: var(--text-soft); }

    /* Message */
    .message { text-align: center; padding: 80px 0; }
    .message-icon { font-size: 2.8rem; margin-bottom: 16px; }
    .message h2 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
    .message p { font-size: 0.875rem; color: var(--text-soft); max-width: 280px; margin: 0 auto; line-height: 1.6; }

    /* Journey card */
    .jcard {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; margin-bottom: 8px;
    }

    .jcard-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
    }
    .srow { display: flex; align-items: center; gap: 6px; }
    .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .slabel { font-size: 0.75rem; font-weight: 600; }

    .platform-badge {
      font-size: 0.7rem; font-weight: 500; color: var(--text-soft);
      background: var(--card-inner); padding: 3px 9px;
      border-radius: 6px; flex-shrink: 0;
    }

    .divider { height: 1px; background: var(--border); }

    /* Route row */
    .jcard-main {
      background: var(--card-inner);
      padding: 14px;
    }
    .jendpoints {
      display: flex; align-items: flex-end;
      gap: 8px;
    }
    .jep { flex: 1; min-width: 0; }
    .jep-right { text-align: right; }
    .jstation { font-size: 0.7rem; color: var(--text-soft); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .jtime {
      font-size: clamp(1.8rem, 8vw, 2.2rem);
      font-weight: 700; letter-spacing: -0.04em; line-height: 1;
      white-space: nowrap;
    }
    .jtime-eta {
      font-size: 0.72rem; font-weight: 600; color: var(--amber);
      margin-top: 3px; white-space: nowrap;
    }
    .jmid {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; flex-shrink: 0; padding-bottom: 3px;
    }
    .jmid-arr { font-size: 0.85rem; color: var(--text-faint); }

    .jcard-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px;
    }
    .jcard-footer span { font-size: 0.7rem; color: var(--text-faint); }

    /* Multi-leg */
    .legs { display: flex; flex-direction: column; gap: 7px; margin-bottom: 8px; }
    .lcard {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px;
    }
    .lhdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .llbl { font-size: 0.62rem; font-weight: 700; letter-spacing: .07em; color: var(--text-faint); }
    .lstatus { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; }
    .ltimes { display: flex; align-items: flex-end; gap: 8px; }
    .ltep { flex: 1; min-width: 0; }
    .ltep-right { text-align: right; }
    .ltime {
      font-size: clamp(1.3rem, 6vw, 1.6rem);
      font-weight: 700; letter-spacing: -0.04em; line-height: 1; white-space: nowrap;
    }
    .lstation { font-size: 0.68rem; color: var(--text-soft); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lop { font-size: 0.68rem; color: var(--text-faint); margin-top: 9px; }

    /* Refresh + CTA */
    .refresh-bar { text-align: center; font-size: 0.7rem; color: var(--text-faint); margin: 10px 0 28px; }

    .cta-block { text-align: center; }
    .cta-block p { font-size: 0.82rem; color: var(--text-soft); margin-bottom: 14px; }
    .store-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--border-lit);
      border-radius: var(--r); padding: 11px 20px;
      text-decoration: none; transition: all .2s;
    }
    .store-btn:hover { border-color: rgba(255,255,255,.2); transform: translateY(-2px); }
    .s-icon { font-size: 1.4rem; }
    .s-grp { text-align: left; }
    .s-l1 { font-size: 0.6rem; color: var(--text-soft); display: block; }
    .s-l2 { font-size: 0.88rem; font-weight: 600; letter-spacing: -0.01em; }

    /* FOOTER */
    hr.rule { border: none; height: 1px; background: var(--border); margin-top: 60px; }
    footer { max-width: 960px; margin: 0 auto; padding: 38px 24px; display: flex; align-items: center; justify-content: space-between; }
    .flogo { font-size: 0.95rem; font-weight: 700; color: var(--text-soft); text-decoration: none; letter-spacing: -0.02em; }
    .flinks { display: flex; gap: 22px; list-style: none; }
    .flinks a { font-size: 0.78rem; color: var(--text-faint); text-decoration: none; transition: color .2s; }
    .flinks a:hover { color: var(--text-soft); }
    .fcopy { font-size: 0.75rem; color: var(--text-faint); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      footer { flex-direction: column; gap: 20px; text-align: center; }
      .flinks { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="https://getplatform.app" class="logo">
    Platform
    <span class="logo-pill"><span class="lp-dot"></span><span class="lp-dash"></span></span>
  </a>
  <div class="live-badge"><span class="live-dot"></span>Live</div>
</nav>

<div class="main">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading journey...</p>
  </div>
  <div id="content" style="display:none;"></div>
</div>

<hr class="rule">
<footer>
  <a href="https://getplatform.app" class="flogo">Platform</a>
  <ul class="flinks">
    <li><a href="/privacy">Privacy</a></li>
    <li><a href="mailto:hello@getplatform.app">Support</a></li>
  </ul>
  <span class="fcopy">© 2026 Platform</span>
</footer>

<script>
  const SUPABASE_URL = 'https://mzgqennedmibxgjpqgns.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_uGgPI0l4aVwMf71EhO1daw_vBZJAKjy';
  const REFRESH_MS = 30000;

  function getShareID() {
    return new URLSearchParams(window.location.search).get('id');
  }

  function statusColor(color) {
    if (color === 'red') return 'var(--red)';
    if (color === 'orange') return 'var(--amber)';
    return 'var(--green)';
  }

  function timeSince(isoStr) {
    const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
    if (diff < 10) return 'just now';
    if (diff < 60) return `${diff}s ago`;
    return `${Math.floor(diff / 60)}m ago`;
  }

  function renderJourney(data) {
    const legs = data.legs || [];
    const color = statusColor(data.status_color);
    const etaChanged = data.estimated_arrival &&
      data.estimated_arrival !== data.scheduled_arrival &&
      data.estimated_arrival !== 'TBC' &&
      data.estimated_arrival !== 'On time';

    const platformDisplay = legs.length > 0
      ? (legs[legs.length - 1]?.platform || legs[0]?.platform)
      : null;

    let legsHTML = '';
    if (data.is_multi_leg && legs.length > 1) {
      legsHTML = `<div class="legs">` + legs.map((leg, i) => {
        const lc = leg.is_cancelled ? 'var(--red)' : leg.is_delayed ? 'var(--amber)' : 'var(--green)';
        const ls = leg.is_cancelled ? 'Cancelled' : leg.is_delayed ? 'Delayed' : 'On Time';
        return `
        <div class="lcard">
          <div class="lhdr">
            <span class="llbl">LEG ${i+1}</span>
            <div class="lstatus">
              <div class="sdot" style="background:${lc};box-shadow:0 0 5px ${lc};"></div>
              <span style="color:${lc}">${ls}</span>
              ${leg.platform ? `<span style="color:var(--text-faint);font-weight:400">&nbsp;· Plat. ${leg.platform}</span>` : ''}
            </div>
          </div>
          <div class="ltimes">
            <div class="ltep">
              <div class="ltime">${leg.scheduled_departure}</div>
              <div class="lstation">${leg.origin}</div>
            </div>
            <span style="color:var(--text-faint);flex-shrink:0;padding-bottom:4px;">→</span>
            <div class="ltep ltep-right">
              <div class="ltime">${leg.scheduled_arrival}</div>
              <div class="lstation">${leg.destination}</div>
            </div>
          </div>
          <div class="lop">🚆 ${leg.operator}</div>
        </div>`;
      }).join('') + `</div>`;
    }

    return `
      <div class="jcard" style="border-color:${data.status_color === 'green' ? 'var(--border)' : color + '44'};">
        <div class="jcard-top">
          <div class="srow">
            <div class="sdot" style="background:${color};box-shadow:0 0 6px ${color};"></div>
            <span class="slabel" style="color:${color}">${data.status}</span>
          </div>
          ${platformDisplay ? `<span class="platform-badge">Plat. ${platformDisplay}</span>` : ''}
        </div>
        <div class="divider"></div>
        <div class="jcard-main">
          <div class="jendpoints">
            <div class="jep">
              <div class="jstation">${data.origin}</div>
              <div class="jtime">${data.scheduled_departure}</div>
            </div>
            <div class="jmid">
              <span class="jmid-arr">→</span>
            </div>
            <div class="jep jep-right">
              <div class="jstation">${data.destination}</div>
              <div class="jtime">${data.scheduled_arrival}</div>
              ${etaChanged ? `<div class="jtime-eta">ETA ${data.estimated_arrival}</div>` : ''}
            </div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="jcard-footer">
          <span>Shared via Platform</span>
          <span>Updated ${timeSince(data.updated_at)}</span>
        </div>
      </div>

      ${legsHTML}

      <div class="refresh-bar">Refreshes every 30 seconds</div>

      <div class="cta-block">
        <p>Track your own journeys with Platform</p>
        <a href="https://getplatform.app" class="store-btn">
          <span class="s-icon">🍎</span>
          <div class="s-grp">
            <span class="s-l1">Download on the</span>
            <span class="s-l2">App Store</span>
          </div>
        </a>
      </div>
    `;
  }

  async function fetchJourney() {
    const id = getShareID();
    if (!id) { showError('No journey found', "This link doesn't point to a valid journey."); return; }

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/active_journeys?share_id=eq.${id}&select=*`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';
      const content = document.getElementById('content');
      content.style.display = 'block';

      if (!data || data.length === 0) {
        content.innerHTML = `<div class="message"><div class="message-icon">🚂</div><h2>Journey ended</h2><p>This journey has finished or the link has expired.</p></div>`;
        return;
      }

      const journey = data[0];
      if (!journey.active) {
        content.innerHTML = `<div class="message"><div class="message-icon">🏁</div><h2>Journey complete</h2><p>${journey.origin} → ${journey.destination} has ended.</p></div>`;
        return;
      }

      content.innerHTML = renderJourney(journey);

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      showError('Something went wrong', "Couldn't load this journey. Try refreshing.");
    }
  }

  function showError(title, msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = `<div class="message"><div class="message-icon">⚠️</div><h2>${title}</h2><p>${msg}</p></div>`;
  }

  fetchJourney();
  setInterval(fetchJourney, REFRESH_MS);
</script>
</body>
</html>
